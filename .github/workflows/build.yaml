name: Build and Release Game

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  BINARY_NAME: superdupervoxels 

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: linux-build
            ext: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: windows-build
            ext: ".exe"
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: macos-intel-build
            ext: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact_name: macos-silicon-build
            ext: ""

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust toolchain
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Rust Cache
      uses: Swatinem/rust-cache@v2
      with:
        key: ${{ matrix.target }}

    - name: Install Linux Dependencies
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y g++ pkg-config libx11-dev libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev

    - name: Build Release
      run: cargo build --release --target ${{ matrix.target }}

    - name: Package Binary (Unix)
      if: runner.os != 'Windows'
      run: zip -j ${{ env.BINARY_NAME }}-${{ matrix.artifact_name }}.zip target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}

    - name: Package Binary (Windows)
      if: runner.os == 'Windows'
      run: Compress-Archive -Path target/${{ matrix.target }}/release/${{ env.BINARY_NAME }}.exe -DestinationPath ${{ env.BINARY_NAME }}-${{ matrix.artifact_name }}.zip

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.BINARY_NAME }}-${{ matrix.artifact_name }}
        path: ${{ env.BINARY_NAME }}-${{ matrix.artifact_name }}.zip
        if-no-files-found: error

  release:
    needs: build 
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/') 
    
    permissions:
      contents: write 
      
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true 

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*.zip
          generate_release_notes: true